name: Auto Release CL (3 platform manual build + package + release)

on:
  workflow_dispatch:
    inputs:
      tag:
        description: '发布使用的 tag，留空则自动使用当前 UTC 日期（YYYY-M-D）'
        required: false
        default: ''
      branch:
        description: '主仓分支名，留空默认 locmain'
        required: false
        default: ''
      framework_branch:
        description: 'osu-framework 分支名，留空默认 locmain'
        required: false
        default: ''
      resources_branch:
        description: 'osu-resources 分支名，留空默认 locmain'
        required: false
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.export.outputs.release_tag }}
      main_branch: ${{ steps.export.outputs.main_branch }}
      framework_branch: ${{ steps.export.outputs.framework_branch }}
      resources_branch: ${{ steps.export.outputs.resources_branch }}
    steps:
      - name: Resolve tag and branches
        id: export
        shell: pwsh
        run: |
          $inputTag = '${{ github.event.inputs.tag }}'
          if ([string]::IsNullOrWhiteSpace($inputTag)) {
            $inputTag = [DateTime]::UtcNow.ToString('yyyy-M-d')
          } elseif ($inputTag -notmatch '^[0-9]{4}-(?:[1-9]|1[0-2])-(?:[1-9]|[12][0-9]|3[01])$') {
            Write-Error 'Tag must match YYYY-M-D with no leading zero in month or day'
            exit 1
          }

          $mainBranch = '${{ github.event.inputs.branch }}'
          if ([string]::IsNullOrWhiteSpace($mainBranch)) { $mainBranch = 'locmain' }

          $frameworkBranch = '${{ github.event.inputs.framework_branch }}'
          if ([string]::IsNullOrWhiteSpace($frameworkBranch)) { $frameworkBranch = 'locmain' }

          $resourcesBranch = '${{ github.event.inputs.resources_branch }}'
          if ([string]::IsNullOrWhiteSpace($resourcesBranch)) { $resourcesBranch = 'locmain' }

          Write-Output "release_tag=$inputTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Output "main_branch=$mainBranch" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Output "framework_branch=$frameworkBranch" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Output "resources_branch=$resourcesBranch" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows
            runner: windows-latest
            publish_os: ''
            asset_name: Ez2Lazer_release_x64.zip
            zip_pattern: Ez2Lazer_release_x64*.zip
          - platform: linux
            runner: ubuntu-latest
            publish_os: linux
            asset_name: Ez2Lazer_release_linux_x64.zip
            zip_pattern: Ez2Lazer_release_linux_x64*.zip
          - platform: macos
            runner: macos-15
            publish_os: osx
            asset_name: Ez2Lazer_release_macos.zip
            zip_pattern: Ez2Lazer_release_macos*.zip
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Checkout main repo into osu/
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: osu
          ref: refs/heads/${{ needs.prepare.outputs.main_branch }}

      - name: Checkout osu-framework (deps) as sibling
        uses: actions/checkout@v4
        with:
          repository: SK-la/osu-framework
          path: osu-framework
          ref: refs/heads/${{ needs.prepare.outputs.framework_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate osu-framework checkout
        shell: pwsh
        run: |
          if (-not (Test-Path 'osu-framework\.git')) {
            Write-Error 'osu-framework checkout missing'
            exit 1
          }

      - name: Checkout osu-resources (resources) as sibling
        uses: actions/checkout@v4
        with:
          repository: SK-la/osu-resources
          path: osu-resources
          ref: refs/heads/${{ needs.prepare.outputs.resources_branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate osu-resources checkout
        shell: pwsh
        run: |
          if (-not (Test-Path 'osu-resources\.git')) {
            Write-Error 'osu-resources checkout missing'
            exit 1
          }

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Dotnet restore (desktop project)
        working-directory: osu
        shell: pwsh
        run: |
          dotnet --info
          dotnet restore ./osu.Desktop/osu.Desktop.csproj

      - name: Dotnet build (desktop project)
        working-directory: osu
        shell: pwsh
        run: |
          dotnet build ./osu.Desktop/osu.Desktop.csproj -c Release -p:GenerateFullPaths=true --no-restore --verbosity minimal

      - name: Run publish script (release only)
        working-directory: osu
        shell: pwsh
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          PYTHONUTF8: '1'
          PYTHONIOENCODING: 'utf-8'
        run: |
          $tag = '${{ needs.prepare.outputs.release_tag }}'
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error 'release tag is missing'
            exit 1
          }

          $workspace = '${{ github.workspace }}'
          $project = Join-Path (Get-Location) 'osu.Desktop\osu.Desktop.csproj'
          $workdir = (Get-Location).Path
          $outroot = $workdir
          $resourcesPath = Join-Path $workspace 'osu-resources\osu.Game.Resources\Resources'

          # Call unified publish.py directly. Add --appimage for linux.
          if ('${{ matrix.platform }}' -eq 'linux') {
            python (Join-Path (Get-Location) 'publish.py') --project "$project" --workdir "$workdir" --outroot "$outroot" --deps-source none --resources-path "$resourcesPath" --tag "$tag" --platform '${{ matrix.platform }}' --os '${{ matrix.publish_os }}' --release-only --appimage
          } else {
            python (Join-Path (Get-Location) 'publish.py') --project "$project" --workdir "$workdir" --outroot "$outroot" --deps-source none --resources-path "$resourcesPath" --tag "$tag" --platform '${{ matrix.platform }}' --os '${{ matrix.publish_os }}' --release-only
          }

      # AppImage is built by publish-linux.py when --appimage is passed for linux

      - name: Normalize artifact name
        id: prepare_asset
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          $artifactsDir = Join-Path $ws 'artifacts'
          if (-not (Test-Path $artifactsDir)) {
            New-Item -ItemType Directory -Path $artifactsDir | Out-Null
          }

          if ('${{ matrix.platform }}' -eq 'linux') {
            $pattern = '*.AppImage'
            $found = Get-ChildItem -Path $ws -Filter $pattern -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 0 } | Select-Object -First 1
            if (-not $found) {
              $found = Get-ChildItem -Path (Join-Path $ws 'artifacts') -Filter $pattern -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 0 } | Select-Object -First 1
            }
            if (-not $found) { Write-Error "AppImage not found"; exit 1 }
            $dest = Join-Path $artifactsDir 'Ez2Lazer_release_linux_x64.AppImage'
            Copy-Item -Path $found.FullName -Destination $dest -Force
            Write-Output "asset_path=$dest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            if ('${{ matrix.platform }}' -eq 'macos') {
              $patterns = @('Ez2Lazer_release_macos*.zip','Ez2Lazer_release_osx*.zip')
              $found = $null
              foreach ($p in $patterns) {
                $found = Get-ChildItem -Path $ws -Filter $p -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 0 } | Select-Object -First 1
                if ($found) { break }
                $found = Get-ChildItem -Path (Join-Path $ws 'osu\artifacts') -Filter $p -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 0 } | Select-Object -First 1
                if ($found) { break }
              }
              if (-not $found) { Write-Error "zip asset not found for mac patterns"; exit 1 }
              $dest = Join-Path $artifactsDir '${{ matrix.asset_name }}'
              Copy-Item -Path $found.FullName -Destination $dest -Force
              Write-Output "asset_path=$dest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            } else {
              if ('${{ matrix.platform }}' -eq 'windows') {
                $patterns = @('Ez2Lazer_release_windows_x64*.zip','Ez2Lazer_release_x64*.zip','Ez2Lazer_release_windows*.zip')
                $found = $null
                foreach ($p in $patterns) {
                  $found = Get-ChildItem -Path $ws -Filter $p -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 0 } | Select-Object -First 1
                  if ($found) { break }
                  $found = Get-ChildItem -Path (Join-Path $ws 'osu\artifacts') -Filter $p -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 0 } | Select-Object -First 1
                  if ($found) { break }
                }
                if (-not $found) { Write-Error "zip asset not found for windows patterns"; exit 1 }
                $dest = Join-Path $artifactsDir '${{ matrix.asset_name }}'
                Copy-Item -Path $found.FullName -Destination $dest -Force
                Write-Output "asset_path=$dest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              } else {
                $pattern = '${{ matrix.zip_pattern }}'
                $found = Get-ChildItem -Path $ws -Filter $pattern -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 0 } | Select-Object -First 1
                if (-not $found) {
                  $found = Get-ChildItem -Path (Join-Path $ws 'osu\artifacts') -Filter $pattern -Recurse -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 0 } | Select-Object -First 1
                }
                if (-not $found) { Write-Error "zip asset not found for pattern $pattern"; exit 1 }
                $dest = Join-Path $artifactsDir '${{ matrix.asset_name }}'
                Copy-Item -Path $found.FullName -Destination $dest -Force
                Write-Output "asset_path=$dest" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
              }
            }
          }

      - name: Debug listing (mac)
        if: ${{ matrix.platform == 'macos' }}
        shell: pwsh
        run: |
          Write-Host '--- Workspace root listing ---'
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 200 | ForEach-Object { Write-Host $_.FullName }
          Write-Host '--- osu/artifacts listing ---'
          $a = Join-Path $env:GITHUB_WORKSPACE 'osu\artifacts'
          if (Test-Path $a) { Get-ChildItem -Path $a -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName } } else { Write-Host 'osu/artifacts not found' }
          Write-Host '--- search Ez2Lazer_release* ---'
          Get-ChildItem -Path $env:GITHUB_WORKSPACE -Filter 'Ez2Lazer_release*' -Recurse -File -ErrorAction SilentlyContinue | ForEach-Object { Write-Host $_.FullName }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: ${{ steps.prepare_asset.outputs.asset_path }}

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main repo into osu/
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: osu
          ref: refs/heads/${{ needs.prepare.outputs.main_branch }}

      - name: Check remote tag existence and create if missing
        shell: pwsh
        run: |
          $tag = '${{ needs.prepare.outputs.release_tag }}'
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error 'release tag is missing'
            exit 1
          }

          $remote = 'https://github.com/${{ github.repository }}.git'
          $authRemote = 'https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git'
          $found = git ls-remote --tags $authRemote refs/tags/$tag | Select-String -Pattern $tag
          if ($found) {
            Write-Output "Tag $tag exists remotely"
            exit 0
          }

          git -C osu config user.name 'github-actions[bot]'
          git -C osu config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          $commit = git -C osu rev-parse HEAD
          git -C osu tag $tag $commit
          git -C osu push $authRemote refs/tags/$tag

      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Release ${{ needs.prepare.outputs.release_tag }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
