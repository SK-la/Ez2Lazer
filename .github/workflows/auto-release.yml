name: Auto Release CL (x64 + arm64, 3 platform manual build + package + release)

on:
  push:
    tags:
      - '*.*.*-ez2lazer'
  workflow_dispatch:
    inputs:
      tag:
        description: '留空=取最新提交上已有 -ez2lazer tag，否则按 UTC 日期自动生成；填写则校验并使用该版本'
        required: false
        default: ''
      no_publish:
        description: '填1表示不发布，留空或0表示发布'
        required: false
        default: ''
      platform_index:
        description: '测试单一平台: 1=windows,2=linux,3=macos（留空表示运行全部）'
        required: false
        default: ''
      arch_index:
        description: '测试单一架构: 1=x64,2=arm64（留空表示运行全部）'
        required: false
        default: ''

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.export.outputs.release_tag }}
      publish_version_tag: ${{ steps.export.outputs.publish_version_tag }}
      skip_release: ${{ steps.export.outputs.skip_release }}
    steps:
      - name: Checkout for tag resolution
        if: github.event_name == 'workflow_dispatch'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve tag and branches
        id: export
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ALLOWED_TAG_PUSHER: SK-la
        run: |
          $eventName = '${{ github.event_name }}'
          $refType = '${{ github.ref_type }}'
          $refName = '${{ github.ref_name }}'
          $actor = '${{ github.actor }}'
          $allowedTagPusher = $env:ALLOWED_TAG_PUSHER
          $skipRelease = 'false'
          $manualTagInput = '${{ github.event.inputs.tag }}'.Trim()
          $inputTag = $manualTagInput

          if ($eventName -eq 'push' -and $refType -eq 'tag') {
            $inputTag = $refName

            # 仅允许指定账号推送的 tag 触发发布，避免上游同步来的 tag 误触发。
            if (-not [string]::IsNullOrWhiteSpace($allowedTagPusher) -and $actor -ne $allowedTagPusher) {
              Write-Warning "Skip release: pushed tag '$inputTag' by actor '$actor' is not allowed (expected '$allowedTagPusher')."
              $skipRelease = 'true'
            }
          }

          function Get-Ez2VersionCore {
            param([Parameter(Mandatory = $true)][string]$Tag)
            return ($Tag -replace '(-ez2lazer)+$', '')
          }

          function Normalize-Ez2ReleaseTag {
            param([Parameter(Mandatory = $true)][string]$Tag)
            $core = Get-Ez2VersionCore $Tag
            if ($core -notmatch '^[0-9]+\.[0-9]+\.[0-9]+$') {
              return $Tag
            }
            return "$core-ez2lazer"
          }

          function Test-IsEz2ReleaseTagCandidate {
            param([Parameter(Mandatory = $true)][string]$Tag)
            return ($Tag -match '^[0-9]+\.[0-9]+\.[0-9]+(-ez2lazer)*$')
          }

          function Get-Ez2TagsOnCommit {
            param([Parameter(Mandatory = $true)][string]$Commit)
            $tags = @(git tag --points-at $Commit 2>$null)
            return @(
              $tags |
                Where-Object { Test-IsEz2ReleaseTagCandidate $_ } |
                ForEach-Object { Normalize-Ez2ReleaseTag $_ } |
                Select-Object -Unique
            )
          }

          function Test-GitHubReleaseTagExists {
            param(
              [Parameter(Mandatory = $true)][string]$Tag
            )

            $repo = '${{ github.repository }}'
            $uri = "https://api.github.com/repos/$repo/releases/tags/$Tag"
            $headers = @{
              'Accept' = 'application/vnd.github+json'
              'X-GitHub-Api-Version' = '2022-11-28'
            }
            if (-not [string]::IsNullOrWhiteSpace($env:GITHUB_TOKEN)) {
              $headers['Authorization'] = "Bearer $env:GITHUB_TOKEN"
            }

            try {
              Invoke-RestMethod -Method Get -Uri $uri -Headers $headers -TimeoutSec 15 | Out-Null
              return $true
            } catch {
              if ($_.Exception.Response -and $_.Exception.Response.StatusCode.value__ -eq 404) {
                return $false
              }

              Write-Warning "Could not verify GitHub Release tag '$Tag' via API: $($_.Exception.Message)"
              return $false
            }
          }

          function Resolve-NextReleaseTag {
            param(
              [Parameter(Mandatory = $true)][string]$BaseTag
            )

            $candidate = Get-Ez2VersionCore $BaseTag
            while ($true) {
              $releaseCandidate = Normalize-Ez2ReleaseTag $candidate
              if (-not (Test-GitHubReleaseTagExists -Tag $releaseCandidate)) {
                return $candidate
              }

              $parts = $candidate.Split('.')
              if ($parts.Count -lt 1 -or $parts[-1] -notmatch '^\d+$') {
                return $candidate
              }

              $prefix = if ($parts.Count -gt 1) { ($parts[0..($parts.Count - 2)] -join '.') } else { $candidate }
              $candidate = "$prefix.$([int]$parts[-1] + 1)"
            }
          }

          if ($eventName -eq 'workflow_dispatch') {
            if ([string]::IsNullOrWhiteSpace($manualTagInput)) {
              $headCommit = (git rev-parse HEAD).Trim()
              if ([string]::IsNullOrWhiteSpace($headCommit)) {
                Write-Warning 'Skip release: could not resolve HEAD commit for tag lookup.'
                $skipRelease = 'true'
              } else {
                Write-Output "Resolving tag from HEAD commit: $headCommit"
                $existingTags = Get-Ez2TagsOnCommit -Commit $headCommit
                if ($existingTags.Count -gt 0) {
                  $inputTag = $existingTags | Sort-Object -Descending | Select-Object -First 1
                  Write-Output "Found existing -ez2lazer tag on HEAD: $inputTag"
                } else {
                  $now = [DateTime]::UtcNow
                  $dateTag = "$($now.Year).$($now.Month)$($now.Day.ToString('D2')).0"
                  $inputTag = Resolve-NextReleaseTag -BaseTag $dateTag
                  Write-Output "No -ez2lazer tag on HEAD; generated candidate: $inputTag"
                }
              }
            } else {
              if (-not (Test-IsEz2ReleaseTagCandidate $manualTagInput)) {
                Write-Warning "Skip release: manual tag '$manualTagInput' must be 'x.y.z' with optional '-ez2lazer' suffix."
                $skipRelease = 'true'
              } else {
                $inputTag = $manualTagInput
                Write-Output "Using manually specified tag: $inputTag"
              }
            }
          } elseif (-not [string]::IsNullOrWhiteSpace($inputTag) -and -not (Test-IsEz2ReleaseTagCandidate $inputTag)) {
            Write-Warning "Skip release: tag '$inputTag' must be 'x.y.z' with optional '-ez2lazer' suffix."
            $skipRelease = 'true'
          }

          if ([string]::IsNullOrWhiteSpace($inputTag)) {
            Write-Warning "Skip release: no valid tag provided/resolved for event '$eventName'."
            $skipRelease = 'true'
          }

          $releaseTag = Normalize-Ez2ReleaseTag $inputTag
          $publishVersionTag = Get-Ez2VersionCore $releaseTag

          if ($releaseTag -notmatch '^[0-9]+\.[0-9]+\.[0-9]+-ez2lazer$') {
            Write-Warning "Skip release: normalized tag '$releaseTag' is invalid."
            $skipRelease = 'true'
          }

          if ($skipRelease -ne 'true' -and (Test-GitHubReleaseTagExists -Tag $releaseTag)) {
            Write-Warning "Skip release: GitHub Release '$releaseTag' already exists. Bump version or delete the existing release before re-running."
            $skipRelease = 'true'
          }

          Write-Output "Resolved input tag: $inputTag"
          Write-Output "Resolved release tag: $releaseTag"
          Write-Output "Resolved publish version tag: $publishVersionTag"
          Write-Output "Skip release: $skipRelease"

          Write-Output "release_tag=$releaseTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Output "publish_version_tag=$publishVersionTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Output "skip_release=$skipRelease" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

  build:
    needs: prepare
    if: ${{ needs.prepare.outputs.skip_release != 'true' }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        platform: ${{ fromJson(github.event.inputs.platform_index == '' && '["windows","linux","macos"]' || github.event.inputs.platform_index == '1' && '["windows"]' || github.event.inputs.platform_index == '2' && '["linux"]' || github.event.inputs.platform_index == '3' && '["macos"]') }}
        arch: ${{ fromJson(github.event.inputs.arch_index == '' && '["x64","arm64"]' || github.event.inputs.arch_index == '1' && '["x64"]' || github.event.inputs.arch_index == '2' && '["arm64"]') }}
    runs-on: ${{ matrix.platform == 'windows' && matrix.arch == 'arm64' && 'windows-11-arm' || matrix.platform == 'windows' && 'windows-latest' || matrix.platform == 'linux' && matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || matrix.platform == 'linux' && 'ubuntu-latest' || matrix.platform == 'macos' && matrix.arch == 'arm64' && 'macos-26' || 'macos-26-intel' }}
    steps:
      - name: Checkout main repo into osu/
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: osu

      - name: Checkout osu-resources (resources) as sibling
        uses: actions/checkout@v4
        with:
          repository: SK-la/osu-resources
          path: osu-resources
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate osu-resources checkout
        shell: pwsh
        run: |
          if (-not (Test-Path 'osu-resources\.git')) {
            Write-Error 'osu-resources checkout missing'
            exit 1
          }

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('osu/**/packages.lock.json', 'osu/**/*.csproj', 'osu/**/*.props', 'osu/**/*.targets', 'osu/global.json', 'osu/NuGet.config') }}
          restore-keys: |
            nuget-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-
            nuget-${{ runner.os }}-

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Cache vpk tool
        uses: actions/cache@v4
        with:
          path: osu/.vpk-tools
          key: vpk-${{ runner.os }}-${{ matrix.platform }}-${{ matrix.arch }}-${{ hashFiles('osu/publish.py') }}

      - name: Dotnet restore (desktop project)
        working-directory: osu
        shell: pwsh
        run: |
          dotnet --info
          dotnet restore ./osu.Desktop/osu.Desktop.csproj /p:Configuration=Release

      - name: Dotnet build (desktop project)
        working-directory: osu
        shell: pwsh
        run: |
          dotnet build ./osu.Desktop/osu.Desktop.csproj -c Release -p:GenerateFullPaths=true --no-restore --verbosity minimal

      - name: Run publish script (release only)
        working-directory: osu
        shell: pwsh
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          PYTHONUTF8: '1'
          PYTHONIOENCODING: 'utf-8'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = '${{ needs.prepare.outputs.publish_version_tag }}'
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error 'publish version tag is missing'
            exit 1
          }
          Write-Output "Packaging with release tag '${{ needs.prepare.outputs.release_tag }}' and publish version '$tag'."

          $workspace = '${{ github.workspace }}'
          $project = Join-Path (Get-Location) 'osu.Desktop\osu.Desktop.csproj'
          $workdir = (Get-Location).Path
          $outroot = $workdir
          $resourcesPath = Join-Path $workspace 'osu-resources\osu.Game.Resources\Resources'
          $platform = '${{ matrix.platform }}'
          $arch = '${{ matrix.arch }}'

          $publishArgs = @(
            (Join-Path (Get-Location) 'publish.py'),
            '--project', $project,
            '--workdir', $workdir,
            '--outroot', $outroot,
            '--deps-source', 'none',
            '--resources-path', $resourcesPath,
            '--tag', $tag,
            '--platform', $platform,
            '--arch', $arch,
            '--official-build',
            '--release-only'
          )
          if ($platform -eq 'linux') {
            $publishArgs += @('--os', 'linux')
            if ($arch -eq 'x64') {
              # Linux x64 additionally produces standalone AppImage for direct distribution.
              $publishArgs += @('--appimage')
            }
          }

          # Keep release channels stable for in-game differential updates.
          # win and linux channels are intentionally x64-only to avoid mixed-arch channel collisions.
          if (($platform -eq 'windows' -and $arch -eq 'arm64') -or ($platform -eq 'linux' -and $arch -eq 'arm64')) {
            $publishArgs += @('--no-velopack')
          }
          python @publishArgs

      # 与安装包共用同一份 osu.Game.dll，保证 NuGet 哈希可与 Release zip 校验一致
      - name: Pack ez2lazer.Game NuGet (linux x64 only)
        if: matrix.platform == 'linux' && matrix.arch == 'x64'
        working-directory: osu
        shell: pwsh
        run: |
          $tag = '${{ needs.prepare.outputs.release_tag }}'
          $releaseDir = Join-Path (Get-Location) 'artifacts/Ez2Lazer_release_linux_x64'
          if (-not (Test-Path $releaseDir)) {
            Write-Error "Release directory not found: $releaseDir"
            exit 1
          }
          ./PackEz2GameNuGet.ps1 -Tag $tag -ReleaseDir $releaseDir

      - name: Collect release artifacts
        id: prepare_asset
        shell: pwsh
        run: |
          $ws = $env:GITHUB_WORKSPACE
          $osuArtifacts = Join-Path $ws 'osu\artifacts'
          $uploadDir = Join-Path $ws 'upload-artifacts'
          if (Test-Path $uploadDir) { Remove-Item -Recurse -Force $uploadDir }
          New-Item -ItemType Directory -Path $uploadDir | Out-Null

          $platform = '${{ matrix.platform }}'
          $arch = '${{ matrix.arch }}'
          $expectVelopack = -not (($platform -eq 'windows' -and $arch -eq 'arm64') -or ($platform -eq 'linux' -and $arch -eq 'arm64'))

          if ($platform -eq 'linux') {
            if ($arch -eq 'arm64') {
              $zipPatterns = @('Ez2Lazer_release_linux_arm64*.zip')
              $zipDest = 'Ez2Lazer_release_linux_arm64.zip'
            } else {
              $zipPatterns = @('Ez2Lazer_release_linux_x64*.zip')
              $zipDest = 'Ez2Lazer_release_linux_x64.zip'
            }
          } elseif ($platform -eq 'macos') {
            if ($arch -eq 'arm64') {
              $zipPatterns = @('Ez2Lazer_release_macos_arm64*.zip')
              $zipDest = 'Ez2Lazer_release_macos_arm64.zip'
            } else {
              $zipPatterns = @('Ez2Lazer_release_macos_x64*.zip')
              $zipDest = 'Ez2Lazer_release_macos_x64.zip'
            }
          } else {
            if ($arch -eq 'arm64') {
              $zipPatterns = @('Ez2Lazer_release_windows_arm64*.zip')
              $zipDest = 'Ez2Lazer_release_windows_arm64.zip'
            } else {
              $zipPatterns = @('Ez2Lazer_release_x64*.zip', 'Ez2Lazer_release_windows_x64*.zip')
              $zipDest = 'Ez2Lazer_release_x64.zip'
            }
          }

          $zipFound = $null
          foreach ($p in $zipPatterns) {
            $zipFound = Get-ChildItem -Path $osuArtifacts -Filter $p -ErrorAction SilentlyContinue | Where-Object { $_.Length -gt 0 } | Select-Object -First 1
            if ($zipFound) { break }
          }
          if (-not $zipFound) { Write-Error "zip asset not found in $osuArtifacts"; exit 1 }
          Copy-Item -Path $zipFound.FullName -Destination (Join-Path $uploadDir $zipDest) -Force

          $tag = '${{ needs.prepare.outputs.release_tag }}'
          $gameNuget = Join-Path $osuArtifacts "nuget-pack/ez2lazer.Game.$tag.nupkg"
          if (Test-Path $gameNuget) {
            Copy-Item -Path $gameNuget -Destination (Join-Path $uploadDir "ez2lazer.Game.$tag.nupkg") -Force
            $gameHash = Get-FileHash -Path $gameNuget -Algorithm SHA256
            Write-Output "ez2lazer.Game NuGet package SHA256: $($gameHash.Hash)"
          }

          $velopackPatterns = @('ez2lazer-*.nupkg', 'RELEASES', 'releases*.json', 'assets*.json', 'ez2lazer-*-Setup.exe', 'ez2lazer*.AppImage', '*.AppImage')
          foreach ($pattern in $velopackPatterns) {
            Get-ChildItem -Path $osuArtifacts -Filter $pattern -ErrorAction SilentlyContinue | ForEach-Object {
              Copy-Item -Path $_.FullName -Destination (Join-Path $uploadDir $_.Name) -Force
            }
          }

          $velopackCount = (Get-ChildItem -Path $uploadDir -Filter 'ez2lazer-*.nupkg' -ErrorAction SilentlyContinue).Count
          if ($velopackCount -eq 0) {
            if ($expectVelopack) {
              Write-Warning 'No Velopack nupkg assets found; in-game differential updates may be unavailable for this job'
            } else {
              Write-Output 'Velopack intentionally disabled for this architecture; zip-only artifacts are expected'
            }
          } elseif ($expectVelopack) {
            $deltaCount = (Get-ChildItem -Path $uploadDir -Filter '*-delta.nupkg' -ErrorAction SilentlyContinue).Count
            if ($deltaCount -eq 0) {
              Write-Warning 'No delta nupkg found for this job. This can happen on first release or when previous channel assets are unavailable.'
            }
          }

          # Diagnostic: list collected artifacts and compute SHA256 for nupkg files for verification
          Write-Output 'Collected artifacts:'
          Get-ChildItem -Path $uploadDir -Recurse | ForEach-Object {
            Write-Output "- $($_.FullName) ($($_.Length) bytes)"
            if ($_.Name -like '*.nupkg') {
              try {
                $hash = Get-FileHash -Path $_.FullName -Algorithm SHA256
                Write-Output "  SHA256: $($hash.Hash)"
              } catch {
                Write-Warning "Failed to compute SHA256 for $($_.FullName): $_"
              }
            }
          }

          Write-Output "asset_dir=$uploadDir" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ format('release-{0}-{1}', matrix.platform, matrix.arch) }}
          path: ${{ steps.prepare_asset.outputs.asset_dir }}

  release:
    needs: [prepare, build]
    if: ${{ needs.prepare.outputs.skip_release != 'true' && github.event.inputs.no_publish != '1' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout main repo into osu/
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          path: osu

      - name: Check remote tag existence and create if missing
        shell: pwsh
        run: |
          $tag = '${{ needs.prepare.outputs.release_tag }}'
          if ([string]::IsNullOrWhiteSpace($tag)) {
            Write-Error 'release tag is missing'
            exit 1
          }

          $remote = 'https://github.com/${{ github.repository }}.git'
          $authRemote = 'https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git'
          $found = git ls-remote --tags $authRemote refs/tags/$tag | Select-String -Pattern $tag
          if ($found) {
            Write-Output "Tag $tag exists remotely"
            exit 0
          }

          git -C osu config user.name 'github-actions[bot]'
          git -C osu config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          $commit = git -C osu rev-parse HEAD
          git -C osu tag $tag $commit
          git -C osu push $authRemote refs/tags/$tag

      - name: Download built assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          pattern: release-*
          merge-multiple: true

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.release_tag }}
          name: Release ${{ needs.prepare.outputs.release_tag }}
          files: release-assets/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
